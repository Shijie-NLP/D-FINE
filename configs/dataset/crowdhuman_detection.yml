task: detection

evaluator:
  type: CocoEvaluator
  iou_types:
    - "bbox"

num_classes: 1 # your dataset classes
remap_mscoco_category: False

train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ~/Data/datasets/CrowdHuman_coco/CrowdHuman_train
    ann_file: ~/Data/datasets/CrowdHuman_coco/Chuman-train.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: True
  num_workers: 4
  drop_last: True
  collate_fn:
    type: BatchImageCollateFunction


val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: ~/Data/datasets/CrowdHuman_coco/CrowdHuman_val
    ann_file: ~/Data/datasets/CrowdHuman_coco/Chuman-val.json
    return_masks: False
    transforms:
      type: Compose
      ops: ~
  shuffle: False
  num_workers: 4
  drop_last: False
  collate_fn:
    type: BatchImageCollateFunction
